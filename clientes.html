<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    margin: 0;
}

/* CONTENEDOR */
.contenedor {
    max-width: 1100px;
    margin: auto;
    padding: 50px 20px;
}

h2 {
    text-align: center;
    color: white;
    margin-bottom: 50px;
    font-size: 32px;
}

/* GRID */
.clientes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

/* TARJETA */
.cliente {
    display: flex;
    gap: 15px;
    align-items: flex-start;

    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.cliente:hover {
    transform: translateY(-10px) scale(1.02);
}

/* FOTO */
.cliente img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid white;
    object-fit: cover;
    transition: 0.3s;
}

.cliente:hover img {
    transform: scale(1.1) rotate(3deg);
}

/* BURBUJA */
.burbuja {
    color: white;
}

.burbuja h3 {
    margin: 0;
    font-size: 18px;
}

.burbuja p {
    font-size: 14px;
    opacity: 0.9;
}

/* ESTRELLAS */
.estrellas i {
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: 0.2s;
}

.estrellas i.activa {
    color: gold;
}

.estrellas i:hover {
    transform: scale(1.3);
}

/* EFECTO HOVER EN GRUPO */
.estrellas i:hover ~ i {
    color: rgba(255,255,255,0.4);
}

</style>
</head>

<body>

<div class="contenedor">
<h2>💬 Opiniones de Clientes</h2>

<div class="clientes">

<!-- CLIENTE -->
<div class="cliente">
    <img src="img/cliente1.jpg">
    <div class="burbuja">
        <h3>Juan Pérez</h3>
        <div class="estrellas" data-rating="5">
            <i class="fas fa-star" data-value="1"></i>
            <i class="fas fa-star" data-value="2"></i>
            <i class="fas fa-star" data-value="3"></i>
            <i class="fas fa-star" data-value="4"></i>
            <i class="fas fa-star" data-value="5"></i>
        </div>
        <p>"Excelente trabajo, muy profesional."</p>
    </div>
</div>

<div class="cliente">
    <img src="img/cliente2.jpg">
    <div class="burbuja">
        <h3>María López</h3>
        <div class="estrellas" data-rating="4">
            <i class="fas fa-star" data-value="1"></i>
            <i class="fas fa-star" data-value="2"></i>
            <i class="fas fa-star" data-value="3"></i>
            <i class="fas fa-star" data-value="4"></i>
            <i class="fas fa-star" data-value="5"></i>
        </div>
        <p>"Me encantó el diseño, lo recomiendo."</p>
    </div>
</div>

<div class="cliente">
    <img src="img/cliente3.jpg">
    <div class="burbuja">
        <h3>Carlos Ramos</h3>
        <div class="estrellas" data-rating="3">
            <i class="fas fa-star" data-value="1"></i>
            <i class="fas fa-star" data-value="2"></i>
            <i class="fas fa-star" data-value="3"></i>
            <i class="fas fa-star" data-value="4"></i>
            <i class="fas fa-star" data-value="5"></i>
        </div>
        <p>"Buen servicio y atención."</p>
    </div>
</div>

<div class="cliente">
    <img src="img/cliente4.jpg">
    <div class="burbuja">
        <h3>Lucía Torres</h3>
        <div class="estrellas" data-rating="5">
            <i class="fas fa-star" data-value="1"></i>
            <i class="fas fa-star" data-value="2"></i>
            <i class="fas fa-star" data-value="3"></i>
            <i class="fas fa-star" data-value="4"></i>
            <i class="fas fa-star" data-value="5"></i>
        </div>
        <p>"Trabajo impecable y rápido."</p>
    </div>
</div>

</div>
</div>

<script>
document.querySelectorAll('.estrellas').forEach(container => {

    const estrellas = container.querySelectorAll('i');
    let rating = container.getAttribute('data-rating');

    estrellas.forEach(star => {
        if (star.getAttribute('data-value') <= rating) {
            star.classList.add('activa');
        }

        star.addEventListener('click', () => {
            let valor = star.getAttribute('data-value');

            estrellas.forEach(s => {
                s.classList.remove('activa');
                if (s.getAttribute('data-value') <= valor) {
                    s.classList.add('activa');
                }
            });

            container.setAttribute('data-rating', valor);
        });
    });

});
</script>

</body>
</html>
